spring.application.name=InventoryManagementSystem
# Railway provides the PORT variable; default to 7575 for local testing
server.port=${PORT:7575}

# Connection using Railway variables with local fallbacks
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:inventorysystem}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Explicitly set the Dialect to avoid the "Unable to determine Dialect" error in logs
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
